<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Lojas</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
  font-family:'Segoe UI', Arial;
  background: linear-gradient(135deg,#1f1f1f,#2b2b2b);
  padding:20px;
  color:#fff;
}

.topo{
  background:#2b2b2b;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

select{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#444;
  color:#fff;
}

.loja{
  background:#2a2a2a;
  padding:15px;
  margin-bottom:20px;
  border-radius:15px;
}

h3{
  color:#ff3b3b;
}

input[type="file"]{
  width:100%;
  margin-top:10px;
}

table{
  width:100%;
  border-collapse: collapse;
  margin-top:15px;
  display:block;
  overflow-x:auto;
}

th{
  background:#ff3b3b;
  padding:10px;
}

td{
  padding:8px;
  background:#333;
}

.resumo{
  margin-top:10px;
  background:#1f1f1f;
  padding:10px;
  border-radius:10px;
}

/* MOBILE */
@media (max-width:768px){
  body{padding:10px;}
  th, td{font-size:12px;}
}

</style>
</head>

<body>

<div class="topo">
  <label>Filtrar loja:</label>
  <select onchange="filtrarLojas(this.value)">      
    <option value="todas">Todas</option>
    <option value="loja1">Agulhas</option>
    <option value="loja2">Pedra</option>
    <option value="loja3">Vargem</option>
  </select>
</div>

<div class="loja" id="loja1">
  <h3>🏪 Agulhas</h3>

  <label>Produtos A.B.C:</label>
  <input type="file" onchange="carregarVendas(event)">

  <select id="filtroGrupoVendas" onchange="filtrarVendas()"></select>

  <div id="tabela"></div>

  <div class="resumo">
    Soma: <span id="soma_loja1">0</span> |
    Média: <span id="media_loja1">0</span>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
